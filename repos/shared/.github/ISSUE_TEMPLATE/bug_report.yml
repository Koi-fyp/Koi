name: Bug Report
description: Report a bug or issue
title: "[BUG] "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the form below to help us understand and fix the issue.

  - type: input
    id: title
    attributes:
      label: Summary
      description: Brief description of the bug
      placeholder: e.g., "Login button not responding on mobile"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Detailed description of the bug
      placeholder: |
        Describe what happened and what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Clear steps to reproduce the issue
      placeholder: |
        1. Navigate to...
        2. Click on...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen instead
      placeholder: "The login should succeed and redirect to the dashboard"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
      placeholder: "The button freezes and no response occurs"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How critical is this issue?
      options:
        - Critical (blocks functionality)
        - High (significant impact)
        - Medium (moderate impact)
        - Low (minor impact)
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: e.g., iOS 17, Flutter 3.19, Chrome 120, etc.
      placeholder: "iOS 17, Flutter 3.19"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs / Stack Trace
      description: Include any error messages or stack traces
      render: shell
      placeholder: |
        ```
        Error: Cannot find module...
        at Object.<anonymous> (/path/to/file.js:1:1)
        ```

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Screen Recording
      description: Add screenshots or screen recordings if applicable

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: I can reproduce the issue consistently
          required: true
        - label: I have provided all necessary information
          required: true
